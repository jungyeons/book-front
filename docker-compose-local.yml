name: book-village-frontend-local

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-village-frontend-local
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      BV_BACKEND_HOST: "${BV_BACKEND_HOST:-book-village-backend-local}"
      BV_BACKEND_PORT: "${BV_BACKEND_PORT:-8080}"
      ADMIN_BACKEND_HOST: "${ADMIN_BACKEND_HOST:-book-village-backend-local}"
      ADMIN_BACKEND_PORT: "${ADMIN_BACKEND_PORT:-8080}"
      NGINX_ENVSUBST_FILTER: "BV_BACKEND_HOST|BV_BACKEND_PORT|ADMIN_BACKEND_HOST|ADMIN_BACKEND_PORT"
    networks:
      - book-village-local-net

networks:
  book-village-local-net:
    external: true
    name: book-village-local-net
