name: book-village-frontend-local

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-village-frontend-local
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      # 로컬 실행 중인 백엔드 (host.docker.internal = 호스트 머신 localhost)
      BV_BACKEND_HOST: "host.docker.internal"
      BV_BACKEND_PORT: "${BV_BACKEND_PORT:-8080}"
      ADMIN_BACKEND_HOST: "host.docker.internal"
      ADMIN_BACKEND_PORT: "${ADMIN_BACKEND_PORT:-8080}"
      NGINX_ENVSUBST_FILTER: "BV_BACKEND_HOST|BV_BACKEND_PORT|ADMIN_BACKEND_HOST|ADMIN_BACKEND_PORT"
    extra_hosts:
      - "host.docker.internal:host-gateway"
