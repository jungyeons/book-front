name: book-village-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-village-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      # 백엔드 EC2 프라이빗 IP 또는 Internal ALB DNS
      BV_BACKEND_HOST: "${BV_BACKEND_HOST}"
      BV_BACKEND_PORT: "${BV_BACKEND_PORT:-8080}"
      ADMIN_BACKEND_HOST: "${ADMIN_BACKEND_HOST}"
      ADMIN_BACKEND_PORT: "${ADMIN_BACKEND_PORT:-8080}"
      NGINX_ENVSUBST_FILTER: "BV_BACKEND_HOST|BV_BACKEND_PORT|ADMIN_BACKEND_HOST|ADMIN_BACKEND_PORT"
